<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scales & Skin</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            padding: 20px;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            border: none;
            overflow: hidden;
            background: var(--white);
        }
        [data-bs-theme="dark"] .auth-wrapper {
            background: #121212;
        }
    </style>
</head>
<body>

    <!-- Floating Controls -->
    <div class="floating-controls">
        <button class="btn btn-outline-primary shadow-sm" id="themeToggle">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="btn btn-outline-primary shadow-sm fw-bold px-3" id="rtlToggle">RTL</button>
    </div>

    <main class="auth-wrapper" style="background-image: url('assets/images/hero-bg.png');">
        <div class="auth-card card">
            <div class="auth-body text-center">
                <a href="index.html">
                    <img src="assets/images/logo.png" alt="Scales & Skin Logo" class="auth-logo">
                </a>
                <h2 class="fw-bold mb-2">Welcome Back</h2>
                <p class="text-muted mb-4">Login to your account</p>
                
                <form class="needs-validation" novalidate>
                    <div class="mb-3 text-start w-100">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control p-3" placeholder="name@example.com" required>
                        <div class="invalid-feedback">Please enter a valid email.</div>
                    </div>
                    
                    <div class="mb-3 text-start w-100">
                        <label class="form-label fw-bold">Password</label>
                        <div class="input-group-auth">
                            <input type="password" class="form-control p-3" id="passwordInput" placeholder="Enter password" required>
                            <i class="bi bi-eye-slash password-toggle" id="togglePassword"></i>
                        </div>
                        <div class="invalid-feedback">Please enter your password.</div>
                    </div>

                    <div class="d-flex align-items-center gap-4 mb-4 w-100 auth-links flex-nowrap">
                        <div class="form-check mb-0 d-flex align-items-center">
                            <input class="form-check-input mt-0 me-2" type="checkbox" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="small text-nowrap">Forgot Password?</a>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 mb-4" type="submit">Login</button>
                    
                    <div class="social-login-separator text-muted small">OR LOGIN WITH</div>

                    <div class="social-login mb-4">
                        <a href="#" class="btn-social google">
                            <i class="bi bi-google"></i> Google
                        </a>
                        <a href="#" class="btn-social apple">
                            <i class="bi bi-apple"></i> Apple
                        </a>
                    </div>

                    <div class="text-center auth-links">
                        <p class="text-muted small mb-0">Don't have an account? <a href="register.html">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
