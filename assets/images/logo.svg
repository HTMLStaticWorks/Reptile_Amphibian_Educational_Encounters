<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
    <style>
        .text-main {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            font-weight: 800;
            font-size: 28px;
            fill: #333333;
            stroke: #ffffff;
            stroke-width: 2.5px;
            paint-order: stroke fill;
        }
        .text-amp {
            fill: #4A5D23;
        }
    </style>
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4A5D23" />
            <stop offset="100%" stop-color="#808000" />
        </linearGradient>
    </defs>
    
    <!-- Abstract Icon: Snake/Leaf shape -->
    <g transform="translate(10, 5)">
        <path d="M 20 0 C 35 0, 40 15, 40 25 C 40 35, 20 40, 20 40 C 20 40, 0 35, 0 25 C 0 15, 5 0, 20 0 Z" fill="url(#grad1)" />
        <path d="M 20 10 C 25 10, 30 15, 30 20 C 30 25, 20 30, 20 30 C 20 30, 10 25, 10 20 C 10 15, 15 10, 20 10 Z" fill="#ffffff" opacity="0.9" />
        <circle cx="20" cy="20" r="4" fill="#00CED1" />
    </g>
    
    <!-- Text -->
    <text x="60" y="34" class="text-main" letter-spacing="-0.5">Amphira</text>
</svg>
